<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ titulo }} | FlexNet Reports</title>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <h2 class="text-center mb-4">{{ titulo }}</h2>

    <div class="d-flex justify-content-center gap-3 mb-4">
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline-primary">Volver</a>
      <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary">Cerrar sesión</a>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-bordered">
        <thead class="table-light">
          <tr>
            {% for col in columnas %}
              <th>{{ col }}</th>
            {% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for fila in datos %}
          <tr>
            {% for valor in fila %}
              <td>{{ valor }}</td>
            {% endfor %}
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
